<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="MediLink — Plataforma de gestión médica y expedientes clínicos digitales">
  <title>MediLink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- App Shell -->
  <div id="app"></div>

  <!-- Toast Notifications -->
  <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

  <!-- Global Loading Overlay -->
  <div id="loading-overlay" role="status" aria-label="Cargando">
    <div class="loading-spinner"></div>
  </div>

  <!-- Modal Container -->
  <div id="modal-container"></div>

  <script src="app.js"></script>
</body>
</html>
